# netlify.toml
[build]
  command = "npm install --prefix netlify/functions && make envbuild"
  publish = "public"

[functions]
  included_files = ["netlify/functions/_generated/**"]
  node_bundler = "esbuild"

[dev]
  framework = "#custom"
  command = "hugo server --environment development --bind 0.0.0.0 --port 1313"
  targetPort = 1313
  publish = "public"
  functions = "netlify/functions"

[build.environment]
  HUGO_VERSION = "0.145.0"
  HUGO_EXTENDED = "true"
  SECRETS_SCAN_OMIT_PATHS = ".obsidian/**"
  SECRETS_SCAN_OMIT_KEYS = "DASHSCOPE_BASE_URL"
  GIT_SUBMODULE_STRATEGY = "recursive"

[context.production.environment]
  HUGO_BASEURL = "https://cubxxw.com"
  HUGO_ENV = "production"
  HUGO_ENABLEGITINFO = "true"
  DASHSCOPE_BASE_URL = "https://dashscope.aliyuncs.com/compatible-mode/v1"
  DASHSCOPE_MODEL = "qwen-turbo"

[context.deploy-preview]
  command = "npm install --prefix netlify/functions && hugo --gc --minify --buildFuture -b $DEPLOY_PRIME_URL"

[context.deploy-preview.environment]
  HUGO_ENV = "development"
  HUGO_ENABLEGITINFO = "true"

[context.branch-deploy]
  command = "npm install --prefix netlify/functions && hugo --gc --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy.environment]
  HUGO_ENV = "development"
  HUGO_ENABLEGITINFO = "true"

# ---------------------------------------------------------------------------
# Cache-Control headers
# ---------------------------------------------------------------------------
# Hugo fingerprints CSS/JS with a SHA-256 hash — these are immutable, 1-year TTL.
# Static JS in /js/ is NOT fingerprinted, so it gets a shorter TTL.
# HTML pages get s-maxage=3600 (1h) so the CDN edge caches aggressively;
# Netlify auto-purges on every deploy so stale HTML is never a problem.

# Fingerprinted CSS and JS (Hugo asset pipeline output).
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Non-fingerprinted static JS (/js/*.js) — 1 hour, revalidate after 24 h.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

# Fingerprinted vendor JS (content hash in filename, e.g. fuse.min.<sha>.js)
# — immutable, 1-year TTL. More specific than /js/*, so it wins for vendor.
[[headers]]
  for = "/js/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Static images under /images/.
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=2592000"

[[headers]]
  for = "/*.ico"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    # Lock SVGs down: no scripts, no external fetches, treated as opaque images.
    # Inline styles are kept (many SVGs use style="" for fills/strokes).
    # sandbox is belt-and-braces for any UA that ignores the directives.
    Content-Security-Policy = "default-src 'none'; style-src 'unsafe-inline'; sandbox"

# HTML pages: CDN edge caches for 1 hour (s-maxage=3600, up from 600).
# stale-while-revalidate=86400 lets the edge serve a cached copy while
# refreshing in the background — cuts TTFB for cold visitors significantly.
# Netlify purges CDN on every deploy, so there is no stale-content risk.
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, s-maxage=3600, stale-while-revalidate=86400"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"

# ---------------------------------------------------------------------------
# Build plugins (file-based, version-controlled — single source of truth)
# ---------------------------------------------------------------------------
# Critical CSS via the maintained fork `netlify-plugin-critical-css`, which
# adds a concurrency pool (@supercharge/promise-pool), per-task timeout and a
# progress bar — many times faster than the original inline-critical-css.
#
# Scope: we deliberately limit it to LANDING templates via `globs` — the
# homepage, section index pages and column landing pages (both languages).
# Every article body shares the same theme critical CSS, so extracting it
# per-post across 1,100+ pages was pure waste and the cause of ~16-minute
# builds. Bodies simply load the normal (fingerprinted, cached) stylesheet.
#
# `base` MUST be the Hugo publish dir. This replaces the UI-installed
# netlify-plugin-inline-critical-css (removed from the Netlify UI).
[[plugins]]
  package = "netlify-plugin-critical-css"
  [plugins.inputs]
    base = "public"
    concurrency = 4
    taskTimeout = 30000
    showProgressBar = true
    globs = [
      "index.html",
      "zh/index.html",
      "start-here/index.html",
      "zh/start-here/index.html",
      "ai-agent/index.html",
      "engineering/index.html",
      "growth/index.html",
      "projects/index.html",
      "articles/index.html",
      "zh/ai-agent/index.html",
      "zh/engineering/index.html",
      "zh/growth/index.html",
      "zh/projects/index.html",
      "zh/articles/index.html",
      "columns/*/index.html",
      "zh/columns/*/index.html"
    ]
