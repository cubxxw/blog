<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="nightSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moonGlow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8f0;stop-opacity:0.3" />
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sky -->
  <rect width="1200" height="675" fill="url(#nightSky)"/>
  
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.7">
    <circle cx="80" cy="60" r="1"/>
    <circle cx="150" cy="100" r="1.5"/>
    <circle cx="250" cy="80" r="1"/>
    <circle cx="350" cy="120" r="1.5"/>
    <circle cx="450" cy="70" r="1"/>
    <circle cx="550" cy="110" r="1.5"/>
    <circle cx="650" cy="90" r="1"/>
    <circle cx="750" cy="130" r="1.5"/>
    <circle cx="850" cy="75" r="1"/>
    <circle cx="950" cy="115" r="1.5"/>
    <circle cx="1050" cy="85" r="1"/>
    <circle cx="1150" cy="125" r="1.5"/>
  </g>
  
  <!-- Moon -->
  <circle cx="600" cy="250" r="100" fill="url(#moonGlow)" filter="url(#softGlow)"/>
  
  <!-- Moon reflection on water -->
  <ellipse cx="600" cy="500" rx="80" ry="30" fill="#ffffff" opacity="0.2" filter="url(#softGlow)"/>
  <ellipse cx="600" cy="520" rx="60" ry="20" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="600" cy="540" rx="40" ry="15" fill="#ffffff" opacity="0.1"/>
  
  <!-- Water surface -->
  <rect x="0" y="450" width="1200" height="225" fill="#1a2332" opacity="0.5"/>
  
  <!-- Shore -->
  <ellipse cx="600" cy="650" rx="500" ry="100" fill="#0f1419"/>
  
  <!-- Human silhouette -->
  <g transform="translate(550, 520)">
    <circle cx="0" cy="0" r="20" fill="#0a0e1a"/>
    <ellipse cx="0" cy="60" rx="18" ry="50" fill="#0a0e1a"/>
    <line x1="0" y1="0" x2="0" y2="-30" stroke="#0a0e1a" stroke-width="12"/>
  </g>
  
  <!-- Caption -->
  <text x="600" y="640" text-anchor="middle" fill="#607080" font-family="Georgia, serif" font-size="18" font-style="italic">
    月色仍然真美——AI 时代里，人类还拥有什么
  </text>
</svg>
