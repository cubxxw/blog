<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="leftSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#4a90d9;stop-opacity:0.1" />
    </linearGradient>
    <linearGradient id="rightSide" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e94560;stop-opacity:0.1" />
      <stop offset="100%" style="stop-color:#e94560;stop-opacity:0.3" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#bgGradient)"/>
  
  <!-- Left side - AI/Tech -->
  <rect x="0" y="0" width="600" height="675" fill="url(#leftSide)"/>
  
  <!-- Right side - Human -->
  <rect x="600" y="0" width="600" height="675" fill="url(#rightSide)"/>
  
  <!-- Center dividing line -->
  <line x1="600" y1="0" x2="600" y2="675" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
  
  <!-- Left: Tech symbols -->
  <g fill="#4a90d9" opacity="0.8">
    <!-- Circuit lines -->
    <line x1="200" y1="200" x2="300" y2="200" stroke="#4a90d9" stroke-width="3"/>
    <line x1="250" y1="200" x2="250" y2="250" stroke="#4a90d9" stroke-width="3"/>
    <circle cx="200" cy="200" r="8" fill="#4a90d9"/>
    <circle cx="300" cy="200" r="8" fill="#4a90d9"/>
    <circle cx="250" cy="250" r="8" fill="#4a90d9"/>
    
    <!-- AI chip -->
    <rect x="220" y="350" width="160" height="160" rx="10" fill="none" stroke="#4a90d9" stroke-width="4"/>
    <rect x="250" y="380" width="100" height="100" fill="#4a90d9" opacity="0.5"/>
    
    <!-- Binary code suggestion -->
    <text x="200" y="580" fill="#4a90d9" font-family="monospace" font-size="14" opacity="0.6">101010</text>
    <text x="280" y="600" fill="#4a90d9" font-family="monospace" font-size="14" opacity="0.6">010101</text>
  </g>
  
  <!-- Right: Human symbols -->
  <g fill="#e94560" opacity="0.8">
    <!-- Heart -->
    <path d="M 850 250 C 850 250 870 230 900 230 C 930 230 950 250 950 250 C 950 250 950 280 900 320 C 850 280 850 250 850 250" 
          fill="#e94560" opacity="0.7"/>
    
    <!-- Hands suggestion -->
    <ellipse cx="820" cy="450" rx="40" ry="60" fill="none" stroke="#e94560" stroke-width="4" opacity="0.6"/>
    <ellipse cx="980" cy="450" rx="40" ry="60" fill="none" stroke="#e94560" stroke-width="4" opacity="0.6"/>
    
    <!-- Natural elements - leaf -->
    <ellipse cx="900" cy="550" rx="60" ry="30" fill="none" stroke="#e94560" stroke-width="3" transform="rotate(45 900 550)"/>
    <line x1="870" y1="520" x2="930" y2="580" stroke="#e94560" stroke-width="2"/>
  </g>
  
  <!-- Balance scale in center -->
  <g transform="translate(600, 350)">
    <line x1="-150" y1="0" x2="150" y2="0" stroke="#ffffff" stroke-width="6" opacity="0.5"/>
    <line x1="0" y1="0" x2="0" y2="150" stroke="#ffffff" stroke-width="8" opacity="0.5"/>
    <circle cx="-150" cy="0" r="15" fill="#4a90d9" opacity="0.8"/>
    <circle cx="150" cy="0" r="15" fill="#e94560" opacity="0.8"/>
  </g>
  
  <!-- Caption -->
  <text x="600" y="640" text-anchor="middle" fill="#8090a0" font-family="Georgia, serif" font-size="20" font-style="italic">
    我们失去的是手段，不是目的
  </text>
</svg>
