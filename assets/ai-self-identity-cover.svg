<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e27;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1f3a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3561;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="moonGradient" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="70%" style="stop-color:#f0f0f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d0d0d0;stop-opacity:1" />
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#skyGradient)"/>
  
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.8">
    <circle cx="100" cy="80" r="1.5"/>
    <circle cx="200" cy="120" r="1"/>
    <circle cx="350" cy="60" r="1.5"/>
    <circle cx="500" cy="100" r="1"/>
    <circle cx="650" cy="70" r="1.5"/>
    <circle cx="800" cy="110" r="1"/>
    <circle cx="950" cy="50" r="1.5"/>
    <circle cx="1100" cy="90" r="1"/>
    <circle cx="150" cy="200" r="1"/>
    <circle cx="400" cy="180" r="1.5"/>
    <circle cx="700" cy="190" r="1"/>
    <circle cx="1000" cy="170" r="1.5"/>
  </g>
  
  <!-- Moon -->
  <circle cx="600" cy="280" r="120" fill="url(#moonGradient)" filter="url(#glow)"/>
  
  <!-- Human Silhouette -->
  <g transform="translate(600, 520)">
    <!-- Body -->
    <ellipse cx="0" cy="80" rx="25" ry="60" fill="#1a1a2e"/>
    <!-- Head -->
    <circle cx="0" cy="0" r="30" fill="#1a1a2e"/>
    <!-- Looking up gesture -->
    <line x1="0" y1="80" x2="0" y2="-40" stroke="#1a1a2e" stroke-width="20"/>
  </g>
  
  <!-- Ground -->
  <ellipse cx="600" cy="600" rx="400" ry="80" fill="#16213e" opacity="0.6"/>
  
  <!-- Title Text -->
  <text x="600" y="500" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="48" font-weight="bold" opacity="0.9">
    AI 越来越聪明
  </text>
  <text x="600" y="550" text-anchor="middle" fill="#a0a0c0" font-family="Arial, sans-serif" font-size="32" opacity="0.8">
    我却越来越不知道自己是谁
  </text>
  
  <!-- Author -->
  <text x="600" y="610" text-anchor="middle" fill="#606080" font-family="Arial, sans-serif" font-size="20">
    cubxxw / 2026
  </text>
</svg>
