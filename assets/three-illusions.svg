<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675">
  <defs>
    <linearGradient id="cosmicBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a15;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1a2e;stop-opacity:1" />
    </linearGradient>
    <filter id="bubbleGlow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="675" fill="url(#cosmicBg)"/>
  
  <!-- Stars -->
  <g fill="#ffffff" opacity="0.6">
    <circle cx="100" cy="100" r="1.5"/>
    <circle cx="200" cy="150" r="1"/>
    <circle cx="300" cy="80" r="1.5"/>
    <circle cx="400" cy="120" r="1"/>
    <circle cx="500" cy="90" r="1.5"/>
    <circle cx="600" cy="140" r="1"/>
    <circle cx="700" cy="100" r="1.5"/>
    <circle cx="800" cy="160" r="1"/>
    <circle cx="900" cy="90" r="1.5"/>
    <circle cx="1000" cy="130" r="1"/>
    <circle cx="1100" cy="110" r="1.5"/>
  </g>
  
  <!-- Three bubbles -->
  <!-- Bubble 1: Knowledge (Book) -->
  <g transform="translate(300, 300)">
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="none" stroke="#4a90d9" stroke-width="3" opacity="0.6" filter="url(#bubbleGlow)"/>
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="#4a90d9" opacity="0.1"/>
    <!-- Book icon -->
    <rect x="-40" y="-30" width="80" height="60" rx="5" fill="none" stroke="#4a90d9" stroke-width="3"/>
    <line x1="0" y1="-30" x2="0" y2="30" stroke="#4a90d9" stroke-width="2"/>
    <line x1="-40" y1="0" x2="40" y2="0" stroke="#4a90d9" stroke-width="2"/>
    <!-- Crack -->
    <line x1="-60" y1="-80" x2="-40" y2="-60" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
    <line x1="80" y1="-70" x2="100" y2="-90" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Bubble 2: Logic (Chess) -->
  <g transform="translate(600, 320)">
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="none" stroke="#50c878" stroke-width="3" opacity="0.6" filter="url(#bubbleGlow)"/>
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="#50c878" opacity="0.1"/>
    <!-- Chess piece (simplified) -->
    <circle cx="0" cy="-40" r="20" fill="none" stroke="#50c878" stroke-width="3"/>
    <polygon points="-25,40 25,40 15,-20 -15,-20" fill="none" stroke="#50c878" stroke-width="3"/>
    <!-- Cracks -->
    <line x1="-80" y1="-60" x2="-60" y2="-80" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
    <line x1="100" y1="-50" x2="120" y2="-70" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
    <line x1="-50" y1="80" x2="-70" y2="100" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Bubble 3: Creativity (Paintbrush) -->
  <g transform="translate(900, 300)">
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="none" stroke="#e94560" stroke-width="3" opacity="0.6" filter="url(#bubbleGlow)"/>
    <ellipse cx="0" cy="0" rx="120" ry="100" fill="#e94560" opacity="0.1"/>
    <!-- Paintbrush -->
    <line x1="-30" y1="50" x2="30" y2="-50" stroke="#e94560" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="30" cy="-50" rx="15" ry="25" fill="#e94560" opacity="0.6"/>
    <!-- Crack -->
    <line x1="-100" y1="-70" x2="-80" y2="-90" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
    <line x1="60" y1="80" x2="80" y2="100" stroke="#ff6b6b" stroke-width="3" opacity="0.8"/>
  </g>
  
  <!-- Shatter particles -->
  <g fill="#ff6b6b" opacity="0.8">
    <circle cx="220" cy="180" r="3"/>
    <circle cx="240" cy="160" r="2"/>
    <circle cx="520" cy="200" r="3"/>
    <circle cx="540" cy="180" r="2"/>
    <circle cx="820" cy="190" r="3"/>
    <circle cx="840" cy="170" r="2"/>
  </g>
  
  <!-- Title -->
  <text x="600" y="550" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="36" font-weight="bold" opacity="0.9">
    三个幻觉的破灭
  </text>
  
  <!-- Caption -->
  <text x="600" y="590" text-anchor="middle" fill="#8090a0" font-family="Georgia, serif" font-size="18" font-style="italic">
    知识 · 逻辑 · 创造力
  </text>
</svg>
