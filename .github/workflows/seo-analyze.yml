name: SEO Analyze

on:
  schedule:
    # Daily at 07:00 UTC (15:00 Beijing). Runs one hour after seo-snapshot
    # so the freshest gsc-/psi-/crux-*.json files are already on main.
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  id-token: write

concurrency:
  group: seo-analyze
  cancel-in-progress: false

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # Enough history for Claude to eyeball trends without cloning
          # the entire log.
          fetch-depth: 30

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # Dry-run mode: read the SEO snapshots, write findings to the
          # tracking issue, do NOT touch the source tree. `contents: read`
          # above already blocks writes at the token level; this prompt is
          # the belt to that suspenders.
          prompt: |
            REPO: ${{ github.repository }}

            You are the SEO analyst for a Hugo blog. Your job today is to
            look at the freshest snapshots in `data/seo/` and post an
            actionable-but-terse daily observation to the rolling tracking
            issue.

            ## Data inputs

            - `data/seo/gsc-YYYY-MM-DD.json` — Google Search Console
              snapshots. Each file has a `meta` block plus four dimension
              slices: `date_query`, `date_page`, `query_device`,
              `query_country`. Empty rows means the property is still fresh
              (Google is processing) — say so plainly, don't invent data.
            - `data/seo/psi-YYYY-MM-DD.json` — PageSpeed Insights, 12 URLs
              × 2 strategies. Focus on `results[].categories.performance`,
              `results[].metrics.LCP`, `results[].fieldData` (real-user
              CrUX; often null on a small site — that's expected).
            - `data/seo/crux-YYYY-MM-DD.json` — CrUX History for the whole
              origin. `notEligible: true` means the origin doesn't have
              enough real Chrome traffic yet — note it once, move on.

            ## What to do

            1. `ls data/seo/` and identify the two most recent dates. If
               only one date is available, use it and say so.
            2. Read the files for those dates. Compare today vs the prior
               snapshot. Look for:
               - PSI performance score deltas > 5 points (mobile OR desktop)
                 on any URL — flag the URL + delta + likely metric to blame
                 (LCP, TBT, CLS).
               - New PSI failures — URLs that returned 500 today.
               - GSC: new queries appearing that aren't landing on a strong
                 page (impressions ≥ 10, position 8–20). These are cheap
                 wins to rewrite title/meta for.
               - GSC: pages with impressions ≥ 20 and CTR < 2%. Title/meta
                 candidates.
               - GSC: hreflang gaps hinted by only one language ranking for
                 a query that clearly has both.
            3. Compose a Markdown comment. Keep it under ~600 words.
               Structure it as:

               ```
               ### 🔍 SEO
               (Data window: ...)

               #### 关键变化
               - ...

               #### 建议动作（本 issue 为 dry-run，不改代码）
               1. **[分类]** 具体建议 — 影响文件路径 — 数据依据
               2. ...

               #### 数据状态
               - GSC: ... rows, ...
               - PSI: ... urls / ... failures
               - CrUX: eligible / not eligible
               ```

               Categories to prefer: `[标题重写]` `[meta 描述]` `[内链]`
               `[新内容机会]` `[性能]` `[hreflang]` `[结构化数据]`.

               If nothing changed meaningfully today, still post a short
               comment — even a heartbeat is signal.

            4. Write the summary into TODAY'S daily report issue. Do NOT create
               or comment on an issue yourself — a shared helper owns that, so
               that Lighthouse and SEO land in one issue per day instead of two
               endless comment threads.

               - Write your Markdown to a file first, e.g. `/tmp/seo-section.md`.
                 Use the `Write` tool for this — do NOT try to `cat`/heredoc it
                 through Bash, since the content has backticks and newlines.
               - Then run exactly:
                 `node scripts/seo-section-to-issue.mjs /tmp/seo-section.md`
               - That script resolves (or creates) the issue titled
                 `站点日报 — YYYY-MM-DD`, replaces the `seo` section in place,
                 and prints the issue number. Re-running OVERWRITES your section
                 rather than appending, which is intended: the day's issue should
                 show the latest read, and the trend lives across daily issues.
               - If the script exits non-zero, report the error plainly. Do not
                 fall back to creating an issue by hand.

               Start your Markdown at the `### 🔍 SEO` heading level shown below
               (it is a section inside a larger issue, not a standalone comment).

            5. Do NOT edit any file in the source tree — `/tmp/seo-section.md`
               is the only file you may write. Do NOT create branches or PRs.
               Do NOT run gh CLI commands other than the ones in allowedTools.

            Data files live in the repo checked out at the workflow's
            working directory; use `Read` for JSON files, `Bash(cat:*)`,
            `Bash(ls:*)`, and `Bash(find:*)` for quick listings.

          claude_args: |
            --max-turns 25
            --allowedTools "Read,Write,Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(node scripts/seo-section-to-issue.mjs:*),Bash(gh issue list:*),Bash(gh issue view:*)"
