name: SEO Autofix (daily)

# Closes the loop that seo-analyze deliberately leaves open. The daily report
# issue accumulates recommendations; before this workflow, acting on them meant
# a human dispatching seo-fix.yml by hand — which happened exactly once. This
# job reads TODAY'S daily issue, picks at most a couple of safe, content-only
# recommendations, opens one small PR per pick, and records what it did (and
# what it skipped, and why) in an `autofix` section of the same issue.
#
# The human stays in the loop at exactly one place: PR review. Nothing merges
# itself. seo-fix.yml remains the manual escape hatch for anything this job
# considers out of scope.

on:
  schedule:
    # Daily at 08:30 UTC (16:30 Beijing) — after seo-analyze (07:00) has
    # written the SEO section and lighthouse (07:30) has written its numbers,
    # so both inform the picks.
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Max PRs to open this run"
        required: false
        default: "2"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: seo-autofix
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        # The section-writer scripts shell out to `gh` and need both of these;
        # neither is inherited by the action's tool sandbox automatically
        # (see the comment in seo-analyze.yml — same failure modes).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "seo-autofix/"
          prompt: |
            REPO: ${{ github.repository }}
            MAX PRS THIS RUN: ${{ inputs.max_prs || '2' }}

            You are the daily autofix operator for a Hugo blog. The site's
            daily report issue (`站点日报 — YYYY-MM-DD`) carries SEO
            recommendations written earlier today by an analysis job. Your job:
            act on the safest, highest-impact ones as small PRs, and write an
            honest log of what you did into the same issue.

            ## Step 1 — locate today's issue and read it

            - `node scripts/daily-report-issue.mjs` prints today's issue
              number (creating the issue if it doesn't exist yet — if it had
              to be created, the analyzers haven't run; write a section saying
              so and stop).
            - `gh issue view <number>` and read the `### 🔍 SEO` section's
              `建议动作` list. Each item follows the shape
              `**[分类]** 建议 — 文件路径 — 数据依据`. Also skim the
              Lighthouse section for corroborating numbers.

            ## Step 2 — backpressure and dedup (do this BEFORE any edit)

            - `gh pr list --label seo-auto --state open --json number,title,headRefName,url`
              — if 3 or more are already open, do NOT open new PRs today.
              Write the autofix section explaining the backlog and stop.
              Unreviewed PRs piling up means the bottleneck is review, not
              generation.
            - `gh pr list --label seo-auto --state all --limit 30 --json title,state,mergedAt,closedAt,headRefName,body`
              — skip any recommendation whose target files overlap an open PR,
              or overlap a PR that was closed WITHOUT merging in the last 14
              days (a human already rejected that idea; don't re-litigate it
              daily).

            ## Step 3 — pick what to act on

            Eligible categories, in priority order:
            1. `[标题重写]` / `[meta 描述]` — frontmatter-only edits to
               `content/**` (title, description). The bread and butter.
            2. `[内链]` — adding a relevant internal link inside an article
               body.
            3. `[结构化数据]` — only when it means frontmatter fields on
               content files.
            4. `[性能]` — ONLY when the fix is pure content: moving images
               into a page bundle, compressing an oversized image, fixing a
               missing image reference. (Precedent: PR #225.)

            NOT eligible — leave these in the issue for a human, and say so in
            your section: anything touching `layouts/**`, `assets/**`,
            `.github/**`, `scripts/**`, `config.yml`, `package.json`,
            `netlify.toml`, `data/seo/**`; anything speculative ("复测",
            "排查", "确认" — investigations are not fixes); anything the
            analyzer itself flagged as possible noise.

            Pick AT MOST the max PR count above, favoring impact (impressions,
            persistence across days) and confidence. Zero picks is a valid
            outcome — never invent work to fill the quota.

            ## Step 4 — make each fix (one branch + PR per pick)

            - Branch: `seo-autofix/YYYYMMDD-<short-slug>` (today's UTC date).
            - Bilingual discipline: when rewriting title/description, edit BOTH
              `content/zh/...` and `content/en/...` variants when both exist —
              each written natively in its own language, not translated
              word-for-word.
            - Chinese titles/descriptions must follow the project's
              anti-AI-flavor rules in CLAUDE.md: no 「不是 X，而是 Y」in
              title/description, no filler like 「本质上」「不仅仅是」.
              Descriptions should promise the searcher a concrete payoff —
              these pages rank but get zero clicks precisely because the
              current text doesn't.
            - Keep each diff minimal: only the files that recommendation
              needs. No opportunistic clean-ups.
            - Build check before every PR: install Hugo once via
              `wget -qO /tmp/hugo.deb https://github.com/gohugoio/hugo/releases/download/v0.147.0/hugo_extended_0.147.0_linux-amd64.deb && sudo dpkg -i /tmp/hugo.deb`,
              then `hugo --gc --minify --quiet` must exit 0.
            - PR body must contain: `## Source` (link to today's issue +
              exact recommendation text quoted), `## Change` (files touched
              and why), `## Verification` (the hugo command and result).
              Label `seo-auto` (create if missing:
              `gh label create seo-auto --color FBCA04 --description "AI-generated SEO fix"` — ignore errors).

            ## Step 5 — write the autofix section (ALWAYS, even on zero picks)

            - Compose Markdown starting at `### 🤖 自动处置`, containing:
              - 已开 PR：one line per PR — 建议原文的分类+对象 → PR 链接
              - 跳过：each skipped recommendation and the one-line reason
                (不在安全范围 / 已有 PR / 此前被拒 / 疑似噪声 / 积压达上限)
              - 状态：open seo-auto PR count.
              Keep it under ~300 words. Plain statements, no cheerleading.
            - Use the `Write` tool to save it to `/tmp/autofix-section.md`
              (do NOT heredoc through Bash), then run exactly:
              `node scripts/report-section-to-issue.mjs autofix /tmp/autofix-section.md`
            - Do NOT edit the issue with gh yourself; the script owns issue
              writes. If it exits non-zero, report the error plainly.

          claude_args: |
            --max-turns 60
            --allowedTools "Read,Edit,Write,Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(grep:*),Bash(git:*),Bash(mkdir:*),Bash(mv:*),Bash(cp:*),Bash(rm:*),Bash(wget:*),Bash(sudo dpkg:*),Bash(hugo:*),Bash(node scripts/daily-report-issue.mjs:*),Bash(node scripts/report-section-to-issue.mjs:*),Bash(gh issue view:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh label create:*)"
