name: SEO Autofix (daily)

# Closes the loop that seo-analyze deliberately leaves open. The daily report
# issue accumulates recommendations; before this workflow, acting on them meant
# a human dispatching seo-fix.yml by hand — which happened exactly once. This
# job invokes the repo skill `.claude/skills/seo-autofix/SKILL.md`, which reads
# TODAY'S daily issue, picks at most a couple of safe, content-only
# recommendations, opens one small PR per pick, and records what it did (and
# what it skipped, and why) in an `autofix` section of the same issue.
#
# The processing logic lives entirely in the skill so it can be run and
# iterated on locally (`/seo-autofix` in a Claude Code session) — this file
# only owns scheduling, permissions, and the tool allowlist. The human stays
# in the loop at exactly one place: PR review. Nothing merges itself.
# seo-fix.yml remains the manual escape hatch for anything out of scope.

on:
  schedule:
    # Daily at 08:30 UTC (16:30 Beijing) — after seo-analyze (07:00) has
    # written the SEO section and lighthouse (07:30) has written its numbers,
    # so both inform the picks.
    - cron: "30 8 * * *"
  workflow_dispatch:
    inputs:
      max_prs:
        description: "Max PRs to open this run"
        required: false
        default: "2"

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

concurrency:
  group: seo-autofix
  cancel-in-progress: false

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        # The section-writer scripts shell out to `gh` and need both of these;
        # neither is inherited by the action's tool sandbox automatically
        # (see the comment in seo-analyze.yml — same failure modes).
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          branch_prefix: "seo-autofix/"
          prompt: |
            REPO: ${{ github.repository }}
            MAX_PRS: ${{ inputs.max_prs || '2' }}

            Invoke the repo skill `seo-autofix` (in `.claude/skills/seo-autofix/`)
            with the Skill tool and follow it exactly — it owns the entire
            procedure: locate today's daily report issue, dedup against prior
            PRs, act on at most MAX_PRS safe recommendations as labeled PRs,
            and write the autofix section back into the issue. Do not improvise
            outside the skill; if the skill cannot be loaded, report that
            plainly instead of reconstructing the procedure from memory.

          claude_args: |
            --max-turns 60
            --allowedTools "Skill,Read,Edit,Write,Bash(ls:*),Bash(cat:*),Bash(find:*),Bash(head:*),Bash(tail:*),Bash(wc:*),Bash(grep:*),Bash(git:*),Bash(mkdir:*),Bash(mv:*),Bash(cp:*),Bash(rm:*),Bash(wget:*),Bash(sudo dpkg:*),Bash(hugo:*),Bash(node scripts/daily-report-issue.mjs:*),Bash(node scripts/report-section-to-issue.mjs:*),Bash(gh issue view:*),Bash(gh pr list:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh label create:*)"
