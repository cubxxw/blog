name: Sitemap Ping

on:
  push:
    branches: ["main"]
    paths:
      - "content/**"
      - "layouts/**"
      - "static/**"
      - "config.yml"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for site to be updated
        run: |
          echo "Waiting for site deployment to propagate..."
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://cubxxw.com/sitemap.xml")
            if [ "$STATUS" = "200" ]; then
              echo "Site is reachable (attempt $i)"
              break
            fi
            echo "Attempt $i: status=$STATUS, retrying in 10s..."
            sleep 10
          done

      - name: Ping Google
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=https%3A%2F%2Fcubxxw.com%2Fsitemap.xml")
          echo "Google ping status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; then
            echo "Warning: Google ping returned $STATUS"
          fi

      # Bing's legacy /ping was deprecated in 2023 — IndexNow (below) replaces it
      # and additionally notifies Yandex. Legacy ping kept as a harmless fallback.
      - name: Ping Bing (legacy fallback)
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.bing.com/ping?sitemap=https%3A%2F%2Fcubxxw.com%2Fsitemap.xml")
          echo "Bing legacy ping status: $STATUS (endpoint is deprecated; IndexNow is primary)"

      - name: Setup Node.js for push scripts
        if: env.BAIDU_PUSH_TOKEN != '' || env.INDEXNOW_KEY != ''
        uses: actions/setup-node@v4
        with:
          node-version: "20"
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Push URLs to IndexNow (Bing + Yandex)
        if: env.INDEXNOW_KEY != ''
        run: node scripts/indexnow-push.mjs --recent 7
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Verify IndexNow key file is reachable
        if: env.INDEXNOW_KEY != ''
        run: |
          KEY_URL="https://cubxxw.com/${{ secrets.INDEXNOW_KEY }}.txt"
          STATUS=$(curl -s -o /tmp/key.txt -w "%{http_code}" "$KEY_URL")
          BODY=$(tr -d '[:space:]' < /tmp/key.txt)
          echo "Key file status: $STATUS, body: $BODY"
          if [ "$STATUS" != "200" ]; then echo "::error::Key file returned $STATUS — IndexNow will 403"; exit 1; fi
          if [ "$BODY" != "${{ secrets.INDEXNOW_KEY }}" ]; then echo "::error::Key file body mismatch — IndexNow will 403"; exit 1; fi
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}

      - name: Push URLs to Baidu (recent 7d, quota-friendly)
        if: env.BAIDU_PUSH_TOKEN != ''
        run: node scripts/baidu-push.mjs --recent 7
        env:
          BAIDU_PUSH_TOKEN: ${{ secrets.BAIDU_PUSH_TOKEN }}

      - name: Verify sitemap is reachable
        run: |
          for url in \
            "https://cubxxw.com/sitemap.xml" \
            "https://cubxxw.com/en/sitemap.xml" \
            "https://cubxxw.com/zh/sitemap.xml"; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$url")
            echo "$url → $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "::error::$url returned $STATUS"
              exit 1
            fi
          done

      - name: Check sitemap quality
        run: |
          # 验证主 sitemap 是 sitemapindex 格式
          CONTENT=$(curl -s "https://cubxxw.com/sitemap.xml")
          if echo "$CONTENT" | grep -q "sitemapindex"; then
            echo "✅ Root sitemap is sitemapindex"
          elif echo "$CONTENT" | grep -q "urlset"; then
            echo "⚠️  Root sitemap is urlset (not sitemapindex) — may be stale cache"
          else
            echo "::error::Root sitemap format is unrecognized"
            exit 1
          fi

          # 验证 en/sitemap.xml 无 zh loc 污染
          EN_ZH_LOCS=$(curl -s "https://cubxxw.com/en/sitemap.xml" | \
            grep -o '<loc>[^<]*</loc>' | grep "/zh/" | wc -l)
          echo "zh <loc> entries in en sitemap: $EN_ZH_LOCS (should be 0)"
          if [ "$EN_ZH_LOCS" -gt "0" ]; then
            echo "::warning::en/sitemap.xml contains $EN_ZH_LOCS zh <loc> entries"
          fi

          # 验证 404 没有进 sitemap
          FOUR04=$(curl -s "https://cubxxw.com/en/sitemap.xml" | \
            grep -o '<loc>[^<]*</loc>' | grep "/404" | wc -l)
          echo "404 entries in en sitemap: $FOUR04 (should be 0)"
          if [ "$FOUR04" -gt "0" ]; then
            echo "::warning::en/sitemap.xml contains $FOUR04 404-page entries"
          fi

          # 报告 URL 数量
          EN_COUNT=$(curl -s "https://cubxxw.com/en/sitemap.xml" | grep -c "<loc>")
          ZH_COUNT=$(curl -s "https://cubxxw.com/zh/sitemap.xml" | grep -c "<loc>")
          echo "📊 en sitemap URLs: $EN_COUNT"
          echo "📊 zh sitemap URLs: $ZH_COUNT"
