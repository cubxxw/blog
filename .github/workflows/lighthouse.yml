name: Lighthouse CI

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Node.js dependencies
        run: npm ci

      - name: Install @lhci/cli
        run: npm install -g @lhci/cli

      # Netlify rebuilds on every push to main; wait it out so lhci scans the
      # freshly deployed HTML instead of the previous revision.
      - name: Wait for Netlify to publish this commit
        if: github.event_name == 'push'
        run: |
          echo "Waiting 120s for Netlify to publish ${GITHUB_SHA}…"
          sleep 120

      - name: Run Lighthouse CI
        run: lhci autorun
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Sync report to tracking issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SHA: ${{ github.sha }}
        run: node scripts/lighthouse-report-to-issue.mjs

      - name: Upload Lighthouse results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-results
          path: .lighthouseci/**
          include-hidden-files: true
          if-no-files-found: warn
          retention-days: 14
