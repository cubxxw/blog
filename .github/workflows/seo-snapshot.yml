name: SEO Snapshot

on:
  schedule:
    # Daily at 06:00 UTC (14:00 Beijing). GSC data lags 2–3 days, so this only
    # needs to run once a day — no benefit to hitting the API more often.
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      lookback:
        description: "Days of history to fetch (default 2 → 3-day window; use 27 for 28-day, 89 for 90-day backfill)"
        required: false
        default: "2"

permissions:
  contents: write

concurrency:
  group: seo-snapshot
  cancel-in-progress: false

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Fetch Google Search Console snapshot
        continue-on-error: true
        env:
          GSC_SERVICE_ACCOUNT_JSON: ${{ secrets.GSC_SERVICE_ACCOUNT_JSON }}
          LOOKBACK: ${{ inputs.lookback || '2' }}
        run: node scripts/gsc-fetch.mjs --lookback "$LOOKBACK"

      - name: Fetch PageSpeed Insights snapshot
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node scripts/psi-fetch.mjs

      - name: Fetch CrUX History snapshot
        continue-on-error: true
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: node scripts/crux-fetch.mjs

      - name: Commit snapshot if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/seo/
          if git diff --cached --quiet; then
            echo "No new snapshot to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(seo): daily SEO snapshot ${DATE}"
          # Retry once if main advanced during the run.
          git pull --rebase origin main
          git push origin main
