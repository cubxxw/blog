name: Github Pull Request

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * *'

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.147.0
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Initialize submodules
        run: |
          git submodule update --init --recursive --depth 1

      - name: Update submodules
        run: git submodule update --remote --merge
        continue-on-error: true

      - name: Copy Readme file to public
        run: cp README.md ./static/
        continue-on-error: true

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.BOT_GITHUB_TOKEN }}
          commit-message: "ci: bump submodules and static assets"
          author: kubbot <3293172751ysy@gmail.com>
          committer: kubbot <3293172751ysy@gmail.com>
          branch: "asf-auto-updates"
          assignees: cubxxw
          reviewers: cubxxw
          title: "[Auto PR 🤖] Bump League Patch auto PR"
          body: |
            Automated PR generated by robot.

            Review criteria:

            - [ ] Submodule updates look correct
            - [ ] Static assets are up to date

            GitHub Actions Status:

            [![Github Pull Request](https://github.com/cubxxw/blog/actions/workflows/pull-request.yml/badge.svg)](https://github.com/cubxxw/blog/actions/workflows/pull-request.yml)

            <sub>[workflow](https://github.com/cubxxw/blog/blob/main/.github/workflows/pull-request.yml)</sub>
          labels: |
            kind/documentation
            enhancement
