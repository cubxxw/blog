# /travel/ "世界游戏" 页面数据
#
# regions —— 世界地图分区。文章按 frontmatter tags 与各区 match 列表求交集归区；
#            没命中任何地区的旅行文章会自动落入页面上的"路上 · 随笔"兜底区。
#            新去一个地方：加一个 region + 给文章打上对应地区 tag 即可。
#            lat/lon —— 数值经纬度，驱动页面顶部点阵世界地图上的发光区与
#            可点击 blip（等距投影）；coords 仅作展示文本。
# books   —— 行囊书单（旅行书架展示区）。直接增删此列表即可，
#            slot_* 是游戏风格的"装备槽位"标签，随意发挥。
#            own: true 表示自己写的书——书脊呈和纸原色并钤朱印「著」；
#            url 可选，给出后整个书脊可点击跳转。
#            ai_prompts_zh / ai_prompts_en —— 每本书 3 个「问 AI」引导问题，
#            点开该书的 AI 对话面板时作为默认胶囊显示。中英各一组，逐本定制。
regions:
  - slug: tibet
    name_zh: 西藏高原
    name_en: Tibetan Plateau
    coords: "29.65°N 91.14°E"
    lat: 29.65
    lon: 91.14
    tagline_zh: 海拔 3650 米，一张强制降速的地图
    tagline_en: "3,650 m above sea level — a map that forces you to slow down"
    hue: 6
    match: ["西藏", "拉萨", "Tibet", "Lhasa"]

  - slug: japan
    name_zh: 日本列岛
    name_en: Japanese Archipelago
    coords: "35.36°N 138.73°E"
    lat: 35.36
    lon: 138.73
    tagline_zh: 用木头、火与缺口和时间共处的群岛
    tagline_en: "Islands that make peace with time through wood, fire and imperfection"
    hue: 340
    match: ["Japan", "日本"]

  - slug: southeast-asia
    name_zh: 东南亚
    name_en: Southeast Asia
    coords: "18.92°N 102.45°E"
    lat: 18.92
    lon: 102.45
    tagline_zh: 湄公河的慢，与岩洞里的光
    tagline_en: "The slowness of the Mekong, and the light inside limestone caves"
    hue: 152
    match: ["老挝旅行 (Laos Travel)", "Laos Travel", "Laos", "老挝", "柬埔寨", "Cambodia", "暹粒"]

books:
  - title_zh: 越南
    title_en: Vietnam
    author_zh: 熊鑫伟 · 自著
    author_en: Xinwei Xiong · self-written
    slot_zh: 自制装备 · 卷一
    slot_en: Crafted Gear · Vol. I
    note_zh: 胡志明的车流、大叻的雾、会安的灯——两个月慢火炖出来的湄公河随笔。
    note_en: Saigon's traffic, Da Lat's fog, Hoi An's lanterns — Mekong field notes, slow-cooked over two months.
    url: https://vietnam.cubxxw.com/
    own: true
    ai_prompts_zh:
      - 这本游记里，越南给作者留下最深的一个瞬间是什么？
      - 两个月慢走越南，和打卡式旅游最大的不同在哪？
      - 如果我只有一周时间去越南，作者会建议怎么走？
    ai_prompts_en:
      - What single moment in Vietnam left the deepest mark on the author?
      - How does two months of slow travel differ from checklist tourism?
      - If I only had a week in Vietnam, what would the author suggest?

  - title_zh: 吴哥窟
    title_en: Angkor
    author_zh: 熊鑫伟 · 自著
    author_en: Xinwei Xiong · self-written
    slot_zh: 自制装备 · 卷二
    slot_en: Crafted Gear · Vol. II
    note_zh: 石头、树根与帝国——走过吴哥的庙宇与废墟，听一个逝去帝国的回声。
    note_en: Stones, roots and empire — walking the ruins of Angkor, listening for the echo of a vanished kingdom.
    url: https://angkor.cubxxw.com/
    own: true
    ai_prompts_zh:
      - 走过吴哥的庙宇与废墟，作者听到了怎样的「帝国回声」？
      - 面对被树根吞没的石头建筑，人会生出什么样的时间感？
      - 去吴哥窟旅行前，最好先了解哪些历史背景？
    ai_prompts_en:
      - What "echo of empire" did the author hear among Angkor's temples and ruins?
      - What sense of time arises before stone swallowed by tree roots?
      - What history is worth knowing before visiting Angkor?

  - title_zh: 西藏
    title_en: Tibet
    author_zh: 熊鑫伟 · 自著
    author_en: Xinwei Xiong · self-written
    slot_zh: 自制装备 · 卷三
    slot_en: Crafted Gear · Vol. III
    note_zh: 海拔 3650 米的拉萨——被高原强制降速的一段路，看云、看人、看信仰怎么落进日子里。
    note_en: Lhasa at 3,650 m — a stretch of road the plateau forces you to slow down on, watching clouds, people and faith settle into everyday life.
    url: https://tibet.cubxxw.com/
    own: true
    ai_prompts_zh:
      - 高原反应之外，西藏最让作者「降速」的是什么？
      - 在拉萨慢下来的这些天，作者看见了怎样的信仰与日常？
      - 第一次进藏，作者会给什么样的节奏建议？
    ai_prompts_en:
      - Beyond altitude sickness, what really made the author slow down in Tibet?
      - What faith and daily life did the author notice in those slow Lhasa days?
      - For a first trip to Tibet, what pace would the author suggest?

  - title_zh: 乱世为龙
    title_en: Dragon in a Broken Age
    author_zh: 熊鑫伟 · 自著
    author_en: Xinwei Xiong · self-written
    slot_zh: 自制装备 · 卷四
    slot_en: Crafted Gear · Vol. IV
    note_zh: 一部写后周太祖郭威的历史长篇——从颈刺飞雀的潞州孤儿，到碎玉罢租、薄葬嵩陵的开国天子。史实为骨，文学为肉。
    note_en: A historical novel of Guo Wei, founding emperor of Later Zhou — from a tattooed orphan in Luzhou to a ruler who smashed the palace jade and chose a pauper's burial. History for the bones, fiction for the flesh.
    url: https://wudai.cubxxw.com/
    own: true
    ai_prompts_zh:
      - 「天子，兵强马壮者为之」——郭威是怎么在这套乱世规则里活下来的？
      - 登基后先砸碎宫里的金玉，郭威想改写的到底是什么？
      - 五代十国为什么是「最黑暗也最赤裸」的五十三年？
    ai_prompts_en:
      - How did Guo Wei survive an age where "the throne goes to whoever has the strongest army"?
      - Why did Guo Wei smash the palace jade the moment he took the throne?
      - What made the Five Dynasties the most brutal, most naked fifty-three years in Chinese history?

  - title_zh: 在路上
    title_en: On the Road
    author_zh: 杰克·凯鲁亚克
    author_en: Jack Kerouac
    slot_zh: 主线剧情
    slot_en: Main Quest
    note_zh: 出发不需要一个成立的理由，出发本身就是理由。
    note_en: You don't need a valid reason to leave — leaving is the reason.
    ai_prompts_zh:
      - 「出发本身就是理由」这句话，在书里是怎么被活出来的？
      - 凯鲁亚克笔下的「垮掉的一代」到底在反抗什么？
      - 这本书为什么能成为公路旅行的精神图腾？
    ai_prompts_en:
      - How is "leaving is the reason" actually lived out in the book?
      - What was Kerouac's Beat Generation really rebelling against?
      - Why did this book become the spiritual icon of road trips?

  - title_zh: 旅行的艺术
    title_en: The Art of Travel
    author_zh: 阿兰·德波顿
    author_en: Alain de Botton
    slot_zh: 视角模组
    slot_en: Perspective Mod
    note_zh: 决定一段旅程质量的不是目的地，而是携带的注意力。
    note_en: What makes a journey is not the destination but the attention you bring.
    ai_prompts_zh:
      - 德波顿说「决定旅程质量的是携带的注意力」，具体怎么理解？
      - 为什么我们对旅行的期待，常常比旅行本身更美好？
      - 怎样才能像书里说的那样，带着哲学的眼光去旅行？
    ai_prompts_en:
      - What does de Botton mean by "the attention you bring" shaping a journey?
      - Why is anticipating travel often better than the trip itself?
      - How can I travel with the philosophical eye the book describes?

  - title_zh: 江城
    title_en: River Town
    author_zh: 彼得·海斯勒
    author_en: Peter Hessler
    slot_zh: 地图注释
    slot_en: Map Annotations
    note_zh: 在一个地方住下来，地图上的名字才会变成人。
    note_en: Only when you stay does a name on the map become people.
    ai_prompts_zh:
      - 海斯勒是怎么从一个外来者，变成能读懂涪陵的人的？
      - 「住下来，地图上的名字才会变成人」在书里怎么体现？
      - 这本书对理解 90 年代的中国有什么独特视角？
    ai_prompts_en:
      - How did Hessler go from outsider to someone who understood Fuling?
      - How does "staying turns a name into people" play out in the book?
      - What unique lens does this book offer on 1990s China?

  - title_zh: 旅行之木
    title_en: The Tree That Travels
    author_zh: 星野道夫
    author_en: Michio Hoshino
    slot_zh: 慢速增益
    slot_en: Slow Buff
    note_zh: 另一片土地上，有一种和我们完全不同的时间在流动。
    note_en: Somewhere else, a completely different kind of time is flowing.
    ai_prompts_zh:
      - 星野道夫说「另一片土地上有完全不同的时间在流动」，指的是什么？
      - 一个摄影师用一生守候阿拉斯加，图的是什么？
      - 这本书如何改变我们对「自然」和「远方」的想象？
    ai_prompts_en:
      - What did Hoshino mean by "a completely different kind of time flowing"?
      - Why would a photographer spend a lifetime keeping vigil over Alaska?
      - How does this book reshape our idea of "nature" and "the far away"?

  - title_zh: 禅与摩托车维修艺术
    title_en: Zen and the Art of Motorcycle Maintenance
    author_zh: 罗伯特·波西格
    author_en: Robert M. Pirsig
    slot_zh: 装备维护手册
    slot_en: Maintenance Manual
    note_zh: 骑在路上修的不是摩托车，是自己的心智。
    note_en: What you maintain on the road is not the motorcycle — it's your mind.
    ai_prompts_zh:
      - 「修的不是摩托车，是自己的心智」——这个隐喻怎么展开的？
      - 书里说的「良质」（Quality）到底是什么？
      - 为什么一本讲摩托车维修的书，会变成哲学经典？
    ai_prompts_en:
      - How does the metaphor "you maintain your mind, not the bike" unfold?
      - What exactly is the "Quality" the book keeps circling?
      - Why did a book about motorcycle maintenance become a philosophy classic?

  - title_zh: 夜航西飞
    title_en: West with the Night
    author_zh: 柏瑞尔·马卡姆
    author_en: Beryl Markham
    slot_zh: 飞行执照
    slot_en: Flight License
    note_zh: 独自飞过黑夜与海洋的人，写下的每个字都有重量。
    note_en: Every word weighs more when written by someone who flew the night alone.
    ai_prompts_zh:
      - 独自飞越黑夜与海洋是种怎样的体验？
      - 为什么海明威说马卡姆的文字让他「羞愧」？
      - 这本书里的非洲和飞行，各自意味着什么？
    ai_prompts_en:
      - What is it like to fly across the night and the ocean alone?
      - Why did Hemingway say Markham's writing made him "ashamed"?
      - What do Africa and flight each mean in this book?
