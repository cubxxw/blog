    color: cobalt
    mark: SC
    url: https://solo.cubxxw.com
    github: https://github.com/getyak/solo-compass

  - id: daypage
    name: DayPage
    stage_zh: 已上线
    stage_en: Live
    headline_zh: 不管理人生，只接住今天。
