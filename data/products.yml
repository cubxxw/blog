products:
  - id: solo-compass
    name: Solo Compass
    stage_zh: 已上线
    stage_en: Live
    headline_zh: 把人生方向，变成每天可以执行的一小步。
    headline_en: Turn life direction into one clear step you can take today.
    desc_zh: 一款安静、清晰的个人方向系统，帮助你梳理长期目标、当下优先级与下一步行动。
