    desc_en: A lightweight space for daily reflection where thoughts, emotions, and actions settle into a timeline worth revisiting.
    audience_zh: 日常记录 · 自我觉察
    audience_en: Daily reflection · Self-awareness
    stack: Next.js · Mobile
    color: amber
    mark: DP
    url: https://daypage.cubxxw.com
    github: https://github.com/getyak/daypage

