books:
  - id: vietnam
    volume: 1
    url: "https://vietnam.cubxxw.com/"
    coverClass: "hp-book-cover-vietnam"
    titleEn: "Vietnam"
    titleZh: "越南"
    subtitleEn: "Field Notes from the Mekong"
    subtitleZh: "湄公河随笔"
    year: 2024
    stamp: "2024 · 越南"
    coords: "10.7769° N · 106.7009° E"
    chapters: 9
    pages: 184
    cities: 7
    excerptEn: "From Hanoi's narrow alleys to the Mekong delta — a slow-cooked record of motorbikes, coffee, monsoon rain, and the strange comfort of being a stranger."
    excerptZh: "从河内到湄公河三角洲，一段慢火细炖的旅程。"
  - id: angkor
    volume: 2
    url: "https://angkor.cubxxw.com/"
    coverClass: "hp-book-cover-angkor"
    titleEn: "Angkor"
    titleZh: "吴哥窟"
    subtitleEn: "Stones, Roots & Empire"
    subtitleZh: "石头、树根与帝国"
    year: 2024
    stamp: "2024 · 柬埔寨"
    coords: "13.4125° N · 103.8670° E"
    chapters: 8
    pages: 156
    cities: 3
    excerptEn: "On the temples beyond the postcards — banyan roots crawling over a lost capital, and what a vanished empire still says to us about scale and silence."
    excerptZh: "走过吴哥的庙宇与废墟，听一个逝去帝国的回声。"

