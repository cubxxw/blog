# start_here.yml — data source for the /start-here/ reading atlas.
#
# Each recommended post stores ONLY its logical page path + a one-line hook.
# Title, permalink and reading time are resolved at build time via
# site.GetPage, so renamed/removed posts surface as build warnings instead
# of silently rotting into dead links. `meta` (optional) overrides the
# auto reading-time label (e.g. for the interactive travel map).
#
# Curation notes (GSC 2026-07): my-hugo is the site CTR champion (10.4%);
# markitdown / langgraph / notebooklm / tdd / gpt-researcher are the top
# organic-traffic pages — the Projects path exists because of them.

zh:
  kicker: "阅读地图"
  heading: "从这里开始"
  intro: "这里是熊鑫伟（cubxxw）的个人博客。写作围绕四条主线：AI 与技术、成长与思考、旅行与观察、项目与实践。不知道从哪读起？下面是为第一次来的你画的地图。"
  first_read:
    label: "只想先读一篇？"
    page: "/growth/posts/2025-annual-review"
    hook: "一年的深度复盘——技术、成长、旅行都在里面。读完这一篇，你就大致认识我了。"
    cta: "从这篇开始"
  paths_title: "选择你的路径"
  paths_note: "四条主线，各选了几篇代表作。挑一条感兴趣的走进去。"
  minutes_tpl: "约 %d 分钟"
  paths:
    - key: ai
      numeral: "01"
      title: "AI 与技术"
      audience: "写给对 AI、大语言模型、Kubernetes 与 Go 工程感兴趣的开发者。"
      more_url: "/zh/ai-technology/"
      more_label: "浏览全部 AI 与技术文章"
      posts:
        - page: "/ai-technology/posts/agent-identity-from-locke-to-openclaw"
          hook: "从洛克的人格同一性谈到 AI 智能体的身份——一篇署名之作。"
        - page: "/ai-technology/posts/my-hugo"
          hook: "这个博客是怎么搭起来的：Hugo 建站的完整实践。"
        - page: "/ai-technology/posts/kubernetes-an-article-to-get-started-quickly"
          hook: "零基础快速理解 Kubernetes 的长青入门篇。"
        - page: "/ai-technology/posts/mem0"
          hook: "给 AI 装上记忆：mem0 架构与原理拆解。"
        - page: "/ai-technology/posts/the-art-of-asking-questions-in-open-source-communities"
          hook: "在开源社区高效提问的艺术——参与开源的第一课。"
    - key: growth
      numeral: "02"
      title: "成长与思考"
      audience: "写给正在自我探索、年度复盘、认知升级路上的你。"
      more_url: "/zh/growth/"
      more_label: "浏览全部成长与思考文章"
      posts:
        - page: "/growth/posts/weight-of-self-in-ai-age"
          hook: "当 AI 什么都会，「我」的重量在哪里？"
        - page: "/growth/posts/flow-state"
          hook: "如何进入并保持心流——一份完整指南。"
        - page: "/growth/posts/metacognitive-transformation-review"
          hook: "元认知转变的亲历复盘：怎样觉察自己的思考。"
        - page: "/growth/posts/gtd-and-the-four-quadrant-rule-practice"
