        url: "https://github.com/cubxxw"
        note: "开源贡献"
      - label: "RSS"
        url: "/zh/index.xml"
        note: "订阅更新"
      - label: "Email"
        url: "mailto:3293172751nss@gmail.com"
        note: "直接联系"
      - label: "Buy Me a Coffee"
        url: "https://www.buymeacoffee.com/cubxxw"
        note: "支持我的写作"

