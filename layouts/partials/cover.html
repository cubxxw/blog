{{- with .cxt}} {{/* Apply proper context from dict */}}
{{- if (and .Params.cover.image (not $.isHidden)) }}
{{- $alt := (.Params.cover.alt | default .Params.cover.caption | plainify) }}
<figure class="entry-cover">
    {{- $responsiveImages := (.Params.cover.responsiveImages | default site.Params.cover.responsiveImages) | default true }}
    {{- $addLink := (and site.Params.cover.linkFullImages (not $.IsHome)) }}
    {{- $pageBundleCover     := (.Resources.ByType "image").GetMatch (printf "*%s*" (.Params.cover.image)) }}
    {{- /* Project override: root-absolute /images/… covers resolve through the
         static/images → assets/images module mount so they get the srcset
         pipeline below. The theme's GetMatch glob can't find them because
         `*` does not cross `/`. */ -}}
    {{- $mountedCover := "" }}
    {{- if hasPrefix .Params.cover.image "/images/" }}
      {{- with resources.Get (strings.TrimPrefix "/" .Params.cover.image) }}
        {{- /* SVG covers must fall through to the theme's absolute-URL branch:
             they have no .Width and the processable-formats check below would
             route them to a broken path.Join URL. */ -}}
        {{- if and (eq .ResourceType "image") (ne .MediaType.SubType "svg") }}{{ $mountedCover = . }}{{ end }}
      {{- end }}
    {{- end }}
    {{- /* SVGs matched from global resources must also fall through to the
         absolute-URL branch: the non-processable fallback path.Joins the cover
         path onto the page's RelPermalink, which 404s for mounted resources. */ -}}
    {{- $globalMatch := "" }}
    {{- if not $mountedCover }}
      {{- with (resources.ByType "image").GetMatch (printf "*%s*" (.Params.cover.image)) }}
        {{- if ne .MediaType.SubType "svg" }}{{ $globalMatch = . }}{{ end }}
      {{- end }}
    {{- end }}
    {{- $globalResourcesCover := or $mountedCover $globalMatch }}
    {{- $cover := (or $pageBundleCover $globalResourcesCover)}}
    {{- if $cover -}}{{/* i.e it is present in page bundle */}}
        {{- if $addLink }}<a href="{{ (path.Join .RelPermalink .Params.cover.image) | absURL }}" target="_blank"
            rel="noopener noreferrer">{{ end -}}
        {{- $sizes := (slice "360" "480" "720" "1080" "1500") }}
        {{- $processableFormats := (slice "jpg" "jpeg" "png" "tif" "bmp" "gif") -}}
        {{- if hugo.IsExtended -}}
            {{- $processableFormats = $processableFormats | append "webp" -}}
        {{- end -}}
        {{- $prod := (hugo.IsProduction | or (eq site.Params.env "production")) }}
        {{- if (and (in $processableFormats $cover.MediaType.SubType) ($responsiveImages) (eq $prod true)) }}
        <img loading="lazy" srcset="{{- range $size := $sizes -}}
                        {{- if (ge $cover.Width $size) -}}
                        {{ printf "%s %s" (($cover.Resize (printf "%sx" $size)).Permalink) (printf "%sw ," $size) -}}
                        {{ end }}
                    {{- end -}}{{$cover.Permalink }} {{printf "%dw" ($cover.Width)}}" 
            sizes="(min-width: 768px) 720px, 100vw" src="{{ $cover.Permalink }}" alt="{{ $alt }}" 
            width="{{ $cover.Width }}" height="{{ $cover.Height }}">
        {{- else }}{{/* Unprocessable image or responsive images disabled */}}
        <img loading="lazy" src="{{ (path.Join .RelPermalink .Params.cover.image) | absURL }}" alt="{{ $alt }}">
        {{- end }}
    {{- else }}{{/* For absolute urls and external links, no img processing here */}}
        {{- if $addLink }}<a href="{{ (.Params.cover.image) | absURL }}" target="_blank"
            rel="noopener noreferrer">{{ end -}}
            <img loading="lazy" src="{{ (.Params.cover.image) | absURL }}" alt="{{ $alt }}">
    {{- end }}
    {{- if $addLink }}</a>{{ end -}}
    {{/*  Display Caption  */}}
    {{- if not $.IsHome }}
        {{ with .Params.cover.caption }}<p>{{ . | markdownify }}</p>{{- end }}
    {{- end }}
</figure>
{{- end }}{{/* End image */}}
{{- end -}}{{/* End context */ -}}
