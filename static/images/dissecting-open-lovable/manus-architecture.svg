<svg viewBox="0 0 1240 1200" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="manus-arch-title manus-arch-desc" font-family="-apple-system, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <title id="manus-arch-title">Manus 类 Agent · 完整架构</title>
  <desc id="manus-arch-desc">自研极简 loop + Claude 推理 + 云端沙箱工具 + context engineering。综合 Manus 团队 2025–2026 公开分享（Manus 1.x）与社区逆向，五层结构：客户端入口 → 传输层 → Agent Runtime + 模型层 → 云端沙箱 → 状态持久化。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#8b949e"/>
    </marker>
    <marker id="arrowStart" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#8b949e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="1240" height="1200" fill="#0d1117"/>
  <text x="60" y="44" fill="#e6edf3" font-size="26" font-weight="700">Manus 类 Agent · 完整架构</text>
  <text x="60" y="68" fill="#8b949e" font-size="13">自研极简 loop + Claude 推理 + 云端沙箱工具 + context engineering（综合公开分享与社区逆向，Manus 1.x）</text>
  <rect x="40" y="90"  width="1160" height="100" rx="16" fill="#58a6ff" opacity="0.05"/>
  <rect x="40" y="206" width="1160" height="84"  rx="16" fill="#d29922" opacity="0.05"/>
  <rect x="40" y="316" width="1160" height="356" rx="16" fill="#a371f7" opacity="0.05"/>
  <rect x="40" y="688" width="1160" height="252" rx="16" fill="#f0883e" opacity="0.05"/>
  <rect x="40" y="956" width="1160" height="132" rx="16" fill="#db61a2" opacity="0.05"/>
  <text x="60" y="112" fill="#58a6ff" font-size="14" font-weight="700">① 客户端入口  ·  CLIENT ENTRY</text>
  <g>
    <rect x="60"  y="122" width="257" height="60" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
    <text x="76" y="146" fill="#e6edf3" font-size="15" font-weight="600">CLI · 终端</text>
    <text x="76" y="166" fill="#8b949e" font-size="11">命令行下发任务 · REPL 交互</text>
  </g>
  <g>
    <rect x="347" y="122" width="257" height="60" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
    <text x="363" y="146" fill="#e6edf3" font-size="15" font-weight="600">macOS App · 桌面</text>
    <text x="363" y="166" fill="#8b949e" font-size="11">原生客户端 · 本地文件 / 通知</text>
  </g>
  <g>
    <rect x="634" y="122" width="257" height="60" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
    <text x="650" y="146" fill="#e6edf3" font-size="15" font-weight="600">Web UI · 浏览器</text>
    <text x="650" y="166" fill="#8b949e" font-size="11">Manus's Computer 实时回放</text>
  </g>
  <g>
    <rect x="921" y="122" width="257" height="60" rx="10" fill="#161b22" stroke="#58a6ff" stroke-width="1.3"/>
    <text x="937" y="146" fill="#e6edf3" font-size="15" font-weight="600">Mobile</text>
    <text x="937" y="166" fill="#8b949e" font-size="11">iOS / Android · fire-and-forget</text>
  </g>
  <line x1="188" y1="182" x2="188" y2="226" stroke="#8b949e" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <line x1="475" y1="182" x2="475" y2="226" stroke="#8b949e" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <line x1="762" y1="182" x2="762" y2="226" stroke="#8b949e" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <line x1="1049" y1="182" x2="1049" y2="226" stroke="#8b949e" stroke-width="1.4" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <g>
    <rect x="60" y="226" width="1118" height="50" rx="10" fill="#161b22" stroke="#d29922" stroke-width="1.4"/>
    <text x="78" y="250" fill="#e6edf3" font-size="15" font-weight="600">② 传输层 · AG-UI Protocol  /  SSE · WebSocket（双向流式 pipe）</text>
    <text x="78" y="268" fill="#8b949e" font-size="11">事件流：thinking · tool_call · tool_result · file_diff · browser_frame · plan_update</text>
  </g>
  <line x1="450" y1="276" x2="450" y2="356" stroke="#8b949e" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="60" y="338" fill="#a371f7" font-size="14" font-weight="700">③ Agent Runtime（云端大脑 · 自研极简 loop，非第三方编排框架）</text>
  <rect x="60" y="356" width="800" height="306" rx="14" fill="#13161d" stroke="#a371f7" stroke-width="1.6"/>
  <rect x="82" y="378" width="756" height="74" rx="9" fill="#1c2030" stroke="#a371f7" stroke-width="1"/>
  <text x="98" y="402" fill="#e6edf3" font-size="14" font-weight="600">主 Loop / Orchestrator</text>
  <text x="98" y="422" fill="#c9d1d9" font-size="12">analyze → plan → execute → observe　（循环 50+ 步）</text>
  <text x="98" y="440" fill="#8b949e" font-size="11">状态由代码维护，不让 LLM 改 status</text>
  <rect x="82" y="464" width="366" height="74" rx="9" fill="#1c2030" stroke="#a371f7" stroke-width="1"/>
  <text x="98" y="486" fill="#e6edf3" font-size="13" font-weight="600">Planner 子 agent</text>
  <text x="98" y="505" fill="#8b949e" font-size="11">独立 context · 跑完即弃</text>
  <text x="98" y="523" fill="#8b949e" font-size="11">→ 产出结构化 Plan 对象</text>
  <rect x="472" y="464" width="366" height="74" rx="9" fill="#1c2030" stroke="#a371f7" stroke-width="1"/>
  <text x="488" y="486" fill="#e6edf3" font-size="13" font-weight="600">Verifier 验证</text>
  <text x="488" y="505" fill="#8b949e" font-size="11">可计算验证（非自报完成）</text>
  <text x="488" y="523" fill="#8b949e" font-size="11">编译? 文件存在? 输出对?</text>
  <rect x="82" y="550" width="756" height="94" rx="9" fill="#181d29" stroke="#7c5fc4" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="98" y="572" fill="#d2c4f5" font-size="12" font-weight="700">Context Engineering（真正的护城河 · 写在代码里的部分）</text>
  <g font-size="10.5">
    <rect x="96"  y="588" width="138" height="44" rx="7" fill="#21263a"/>
    <text x="165" y="606" fill="#e6edf3" text-anchor="middle" font-weight="600">KV-cache 优化</text>
    <text x="165" y="622" fill="#8b949e" text-anchor="middle">稳定前缀 ~10x</text>
    <rect x="244" y="588" width="138" height="44" rx="7" fill="#21263a"/>
    <text x="313" y="606" fill="#e6edf3" text-anchor="middle" font-weight="600">文件 = 外部记忆</text>
    <text x="313" y="622" fill="#8b949e" text-anchor="middle">超长产物外置</text>
    <rect x="392" y="588" width="138" height="44" rx="7" fill="#21263a"/>
    <text x="461" y="606" fill="#e6edf3" text-anchor="middle" font-weight="600">todo.md 复述</text>
    <text x="461" y="622" fill="#8b949e" text-anchor="middle">对抗注意力漂移</text>
    <rect x="540" y="588" width="138" height="44" rx="7" fill="#21263a"/>
    <text x="609" y="606" fill="#e6edf3" text-anchor="middle" font-weight="600">action masking</text>
    <text x="609" y="622" fill="#8b949e" text-anchor="middle">mask logits</text>
    <rect x="688" y="588" width="138" height="44" rx="7" fill="#21263a"/>
    <text x="757" y="606" fill="#e6edf3" text-anchor="middle" font-weight="600">保留错误</text>
    <text x="757" y="622" fill="#8b949e" text-anchor="middle">作为学习信号</text>
  </g>
  <rect x="890" y="356" width="288" height="306" rx="14" fill="#13161d" stroke="#3fb950" stroke-width="1.6"/>
  <text x="908" y="382" fill="#3fb950" font-size="14" font-weight="700">③′ 模型层</text>
  <rect x="908" y="396" width="252" height="116" rx="9" fill="#16241b" stroke="#3fb950" stroke-width="1"/>
  <text x="924" y="420" fill="#e6edf3" font-size="15" font-weight="600">Claude 家族</text>
  <text x="924" y="442" fill="#c9d1d9" font-size="12">主推理引擎</text>
  <text x="924" y="461" fill="#8b949e" font-size="11">long-horizon planning 强</text>
  <text x="924" y="479" fill="#8b949e" font-size="11">→ Manus 选型关键差异点</text>
  <text x="924" y="499" fill="#6e9e78" font-size="11">（上线首 14 天 $1M API）</text>
  <rect x="908" y="524" width="252" height="64" rx="9" fill="#16241b" stroke="#3fb950" stroke-width="1"/>
  <text x="924" y="547" fill="#e6edf3" font-size="13" font-weight="600">Qwen 微调（辅助）</text>
  <text x="924" y="566" fill="#8b949e" font-size="11">特定子任务 · 降本</text>
  <text x="924" y="582" fill="#8b949e" font-size="11">多模型按需调度</text>
  <text x="908" y="616" fill="#8b949e" font-size="11">模型可替换 ·</text>
  <text x="908" y="632" fill="#8b949e" font-size="11">框架不是护城河，</text>
  <text x="908" y="648" fill="#8b949e" font-size="11">context 工程才是</text>
  <line x1="860" y1="440" x2="890" y2="440" stroke="#8b949e" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="833" y="432" fill="#8b949e" font-size="10" text-anchor="middle">推理</text>
  <line x1="450" y1="662" x2="450" y2="724" stroke="#8b949e" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="470" y="698" fill="#8b949e" font-size="10">tool 调用 / 观测回流</text>
  <text x="60" y="710" fill="#f0883e" font-size="14" font-weight="700">④ 云端沙箱 · 每任务一个隔离 Linux VM（强隔离 · fire-and-forget · 关键操作前 HITL 人工确认）</text>
  <rect x="60" y="724" width="1118" height="200" rx="14" fill="#13161d" stroke="#f0883e" stroke-width="1.6"/>
  <rect x="1006" y="700" width="172" height="22" rx="11" fill="#3a2516" stroke="#f0883e" stroke-width="1"/>
  <text x="1092" y="715" fill="#f0a868" font-size="10.5" text-anchor="middle">HITL 人工确认 / token 不出沙箱</text>
  <rect x="84" y="748" width="250" height="152" rx="10" fill="#1f1812" stroke="#f0883e" stroke-width="1"/>
  <text x="100" y="773" fill="#e6edf3" font-size="14" font-weight="600">浏览器操作</text>
  <text x="100" y="797" fill="#c9d1d9" font-size="12">Chromium（反爬加固）</text>
  <text x="100" y="817" fill="#8b949e" font-size="11">+ browser-use 协议层</text>
  <text x="100" y="836" fill="#8b949e" font-size="11">（只取通信层，弃其框架）</text>
  <text x="100" y="858" fill="#8b949e" font-size="11">截图 / DOM / 点击 / 填表</text>
  <text x="100" y="878" fill="#8b949e" font-size="11">截图+DOM+坐标 多模态喂回</text>
  <rect x="358" y="748" width="250" height="152" rx="10" fill="#1f1812" stroke="#f0883e" stroke-width="1"/>
  <text x="374" y="773" fill="#e6edf3" font-size="14" font-weight="600">电脑操作</text>
  <text x="374" y="797" fill="#c9d1d9" font-size="12">Shell / Terminal</text>
  <text x="374" y="817" fill="#8b949e" font-size="11">bash 命令执行</text>
  <text x="374" y="836" fill="#8b949e" font-size="11">安装依赖 · 启动进程</text>
  <text x="374" y="858" fill="#8b949e" font-size="11">系统级操作</text>
  <text x="374" y="878" fill="#8b949e" font-size="11">云 VM 隔离，不怕搞坏</text>
  <rect x="632" y="748" width="250" height="152" rx="10" fill="#1f1812" stroke="#f0883e" stroke-width="1"/>
  <text x="648" y="773" fill="#e6edf3" font-size="14" font-weight="600">代码执行</text>
  <text x="648" y="797" fill="#c9d1d9" font-size="12">Python Runtime</text>
  <text x="648" y="817" fill="#8b949e" font-size="11">CodeAct：代码即 action</text>
  <text x="648" y="836" fill="#8b949e" font-size="11">数据处理 · 生成产物</text>
  <text x="648" y="858" fill="#8b949e" font-size="11">网页 / 文档 / 幻灯片</text>
  <text x="648" y="878" fill="#8b949e" font-size="11">比 function-call 更灵活</text>
  <rect x="906" y="748" width="250" height="152" rx="10" fill="#1f1812" stroke="#f0883e" stroke-width="1"/>
  <text x="922" y="773" fill="#e6edf3" font-size="14" font-weight="600">文件读取</text>
  <text x="922" y="797" fill="#c9d1d9" font-size="12">File System</text>
  <text x="922" y="817" fill="#8b949e" font-size="11">读写文件 · scratchpad</text>
  <text x="922" y="836" fill="#8b949e" font-size="11">分段存中间产物</text>
  <text x="922" y="858" fill="#8b949e" font-size="11">充当"无限上下文"</text>
  <text x="922" y="878" fill="#8b949e" font-size="11">→ 回流给 Context 层</text>
  <line x1="450" y1="924" x2="450" y2="990" stroke="#8b949e" stroke-width="1.6" marker-end="url(#arrow)" marker-start="url(#arrowStart)"/>
  <text x="470" y="962" fill="#8b949e" font-size="10">读写状态 / 落盘</text>
  <text x="60" y="978" fill="#db61a2" font-size="14" font-weight="700">⑤ 状态与持久化  ·  STATE &amp; PERSISTENCE</text>
  <rect x="60" y="990" width="353" height="86" rx="10" fill="#161b22" stroke="#db61a2" stroke-width="1.3"/>
  <text x="76" y="1014" fill="#e6edf3" font-size="14" font-weight="600">Plan 对象（结构化）</text>
  <text x="76" y="1035" fill="#8b949e" font-size="11">step[] + status 字段，活在 context 之外</text>
  <text x="76" y="1054" fill="#8b949e" font-size="11">代码改字段 → 直接驱动前端 step UI</text>
  <rect x="443" y="990" width="353" height="86" rx="10" fill="#161b22" stroke="#db61a2" stroke-width="1.3"/>
  <text x="459" y="1014" fill="#e6edf3" font-size="14" font-weight="600">文件记忆</text>
  <text x="459" y="1035" fill="#8b949e" font-size="11">todo.md 清单 · 分段产物文件</text>
  <text x="459" y="1054" fill="#8b949e" font-size="11">URL/路径占位 → 可恢复压缩，不丢信息</text>
  <rect x="826" y="990" width="352" height="86" rx="10" fill="#161b22" stroke="#db61a2" stroke-width="1.3"/>
  <text x="842" y="1014" fill="#e6edf3" font-size="14" font-weight="600">Session 持久化</text>
  <text x="842" y="1035" fill="#8b949e" font-size="11">Thread 历史 · Replay 回放（信任 / 调试）</text>
  <text x="842" y="1054" fill="#8b949e" font-size="11">任务可暂停 / 续跑 · 上下文丢了也能恢复</text>
  <text x="60" y="1116" fill="#6e7681" font-size="11">说明：综合 Manus 团队 2025–2026 公开分享（Manus 1.x）与社区逆向。编排层为自研薄 loop，框架细节未公开到代码粒度，多 agent 内部结构含推测成分，仅供架构参考。</text>
  <text x="60" y="1136" fill="#6e7681" font-size="11">阅读方向：① 入口 ↓ ② 传输 ↓ ③ 大脑 ↔ ③′ 模型 ↓ ④ 沙箱工具 ↓ ⑤ 状态持久化。横向 ↔ 表示双向流（命令下行 / 观测上行）。</text>
</svg>
