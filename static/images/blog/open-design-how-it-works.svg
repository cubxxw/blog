<svg xmlns="http://www.w3.org/2000/svg" width="880" height="590" viewBox="0 0 880 590" role="img" aria-labelledby="t d">
  <title id="t">Open Design 工作原理</title>
  <desc id="d">你本机已有的 coding agent 充当设计引擎，Open Design 编排技能、设计系统与插件三层文件，跑「需求→方向→工件→交付→记忆」的循环，产出 HTML/PDF/PPTX/MP4。</desc>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#94a3b8"/></marker>
    <style>
      .h{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',Arial,sans-serif;}
      .m{font-family:'PingFang SC','Microsoft YaHei','Noto Sans SC',Arial,sans-serif;}
    </style>
  </defs>

  <rect width="880" height="590" fill="#f7f9fb"/>
  <rect x="16" y="14" width="848" height="562" rx="22" fill="#ffffff" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- title -->
  <text class="h" x="40" y="52" font-size="25" font-weight="700" fill="#0f766e">Open Design 工作原理</text>
  <text class="m" x="40" y="78" font-size="14" fill="#64748b">你的 coding agent 当引擎，OD 编排「技能 · 设计系统 · 插件」三层文件</text>

  <!-- engine layer -->
  <rect x="150" y="98" width="580" height="56" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
  <text class="h" x="440" y="124" text-anchor="middle" font-size="15" font-weight="700" fill="#16233a">你本机已有的 Coding Agent = 设计引擎</text>
  <text class="m" x="440" y="143" text-anchor="middle" font-size="11.5" fill="#64748b">Claude Code · Codex · Cursor · Gemini · PATH 上 8+ 种 CLI，或 BYOK 接兼容端点</text>
  <line x1="440" y1="154" x2="440" y2="180" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- orchestration layer -->
  <rect x="60" y="182" width="760" height="112" rx="12" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.8"/>
  <text class="h" x="440" y="208" text-anchor="middle" font-size="15" font-weight="700" fill="#0f766e">Open Design 编排层（本地优先 · 自身不含模型）</text>
  <g>
    <rect x="88" y="224" width="220" height="52" rx="9" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.4"/>
    <text class="h" x="198" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">技能 Skills</text>
    <text class="m" x="198" y="264" text-anchor="middle" font-size="11" fill="#64748b">承载 agent 的品味</text>
    <rect x="330" y="224" width="220" height="52" rx="9" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.4"/>
    <text class="h" x="440" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">设计系统 DESIGN.md</text>
    <text class="m" x="440" y="264" text-anchor="middle" font-size="11" fill="#64748b">承载品牌</text>
    <rect x="572" y="224" width="220" height="52" rx="9" fill="#ffffff" stroke="#a7f3d0" stroke-width="1.4"/>
    <text class="h" x="682" y="246" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">插件 Plugins</text>
    <text class="m" x="682" y="264" text-anchor="middle" font-size="11" fill="#64748b">承载可运行工作流</text>
  </g>
  <line x1="440" y1="294" x2="440" y2="316" stroke="#94a3b8" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- agent-native loop -->
  <text class="h" x="440" y="334" text-anchor="middle" font-size="12.5" font-weight="700" fill="#475569">Agent 原生循环</text>
  <g>
    <rect x="60" y="344" width="128" height="58" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.3"/>
    <text class="h" x="124" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">① 需求</text>
    <text class="m" x="124" y="388" text-anchor="middle" font-size="10.5" fill="#64748b">选插件</text>
    <rect x="213" y="344" width="128" height="58" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.3"/>
    <text class="h" x="277" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">② 方向</text>
    <text class="m" x="277" y="388" text-anchor="middle" font-size="10.5" fill="#64748b">定设计系统</text>
    <rect x="366" y="344" width="128" height="58" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.3"/>
    <text class="h" x="430" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">③ 工件</text>
    <text class="m" x="430" y="388" text-anchor="middle" font-size="10.5" fill="#64748b">沙箱 iframe 预览</text>
    <rect x="519" y="344" width="128" height="58" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.3"/>
    <text class="h" x="583" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">④ 交付</text>
    <text class="m" x="583" y="388" text-anchor="middle" font-size="10.5" fill="#64748b">导出 / 接工程</text>
    <rect x="672" y="344" width="128" height="58" rx="9" fill="#f0fdfa" stroke="#0f766e" stroke-width="1.3"/>
    <text class="h" x="736" y="369" text-anchor="middle" font-size="13" font-weight="700" fill="#16233a">⑤ 记忆</text>
    <text class="m" x="736" y="388" text-anchor="middle" font-size="10.5" fill="#64748b">沉淀默认值</text>
  </g>
  <line x1="188" y1="373" x2="211" y2="373" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="341" y1="373" x2="364" y2="373" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="494" y1="373" x2="517" y2="373" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <line x1="647" y1="373" x2="670" y2="373" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#ah)"/>
  <path d="M736,402 L736,420 L124,420 L124,404" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#ah)"/>
  <text class="m" x="440" y="437" text-anchor="middle" font-size="11" fill="#64748b">越用越聪明：截图 / 字体 / 色板 / 已确认工件回流为下次默认</text>

  <!-- outputs -->
  <rect x="150" y="452" width="580" height="54" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.6"/>
  <text class="h" x="440" y="476" text-anchor="middle" font-size="14" font-weight="700" fill="#16233a">真实文件产出</text>
  <text class="m" x="440" y="495" text-anchor="middle" font-size="11" fill="#64748b">HTML（内联）· PDF · PPTX · MP4 · ZIP · 可交接 Cursor/Codex 转 React/Vue/Next</text>

  <!-- legend + footer -->
  <rect x="212" y="528" width="14" height="10" rx="2" fill="#ecfdf5" stroke="#0f766e" stroke-width="1.5"/>
  <text class="m" x="232" y="537" font-size="11" fill="#64748b">Open Design 提供的部分</text>
  <rect x="410" y="528" width="14" height="10" rx="2" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text class="m" x="430" y="537" font-size="11" fill="#64748b">你已有的 / 产出物</text>
  <text class="h" x="40" y="537" font-size="12" font-weight="700" letter-spacing="2" fill="#0f766e">CUBXXW.COM</text>
</svg>
