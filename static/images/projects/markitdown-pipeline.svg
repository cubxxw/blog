<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 560" role="img" aria-labelledby="title desc">
  <title id="title">MarkItDown document conversion pipeline</title>
  <desc id="desc">A diagram showing many document formats flowing through type detection, converters, optional services, and Markdown output for RAG pipelines.</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.panel{fill:#fff;stroke:#cbd5e1;stroke-width:2}.box{fill:#eef2ff;stroke:#4f46e5;stroke-width:2}.service{fill:#ecfdf5;stroke:#059669;stroke-width:2}.warn{fill:#fff7ed;stroke:#ea580c;stroke-width:2}.out{fill:#f0f9ff;stroke:#0284c7;stroke-width:2}.text{font:600 24px Arial,sans-serif;fill:#0f172a}.small{font:500 18px Arial,sans-serif;fill:#334155}.tiny{font:500 15px Arial,sans-serif;fill:#475569}.arrow{stroke:#334155;stroke-width:3;fill:none;marker-end:url(#arrow)}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M2,2 L10,6 L2,10 z" fill="#334155"/></marker>
  </defs>
  <rect class="bg" width="1120" height="560" rx="24"/>
  <text x="56" y="62" class="text">MarkItDown: from mixed files to LLM-friendly Markdown</text>
  <rect x="54" y="104" width="210" height="330" rx="18" class="panel"/>
  <text x="86" y="148" class="small">Input formats</text>
  <text x="86" y="196" class="tiny">PDF / DOCX / PPTX</text>
  <text x="86" y="228" class="tiny">XLSX / HTML / CSV</text>
  <text x="86" y="260" class="tiny">JSON / XML / EPUB</text>
  <text x="86" y="292" class="tiny">Images / Audio</text>
  <text x="86" y="324" class="tiny">ZIP / YouTube URLs</text>
  <path class="arrow" d="M264 268 H354"/>
  <rect x="354" y="124" width="230" height="108" rx="16" class="box"/>
  <text x="394" y="170" class="small">Type detection</text>
  <text x="394" y="202" class="tiny">extension, MIME, Magika</text>
  <rect x="354" y="304" width="230" height="108" rx="16" class="box"/>
  <text x="394" y="350" class="small">Converter registry</text>
  <text x="394" y="382" class="tiny">DocumentConverter plugins</text>
  <path class="arrow" d="M469 232 V304"/>
  <path class="arrow" d="M584 358 H682"/>
  <rect x="682" y="86" width="260" height="108" rx="16" class="service"/>
  <text x="724" y="132" class="small">Optional services</text>
  <text x="724" y="164" class="tiny">LLM image captions, Azure DI</text>
  <rect x="682" y="244" width="260" height="108" rx="16" class="warn"/>
  <text x="724" y="290" class="small">Quality gate</text>
  <text x="724" y="322" class="tiny">OCR, tables, privacy, plugins</text>
  <rect x="682" y="402" width="260" height="108" rx="16" class="out"/>
  <text x="724" y="448" class="small">Markdown output</text>
  <text x="724" y="480" class="tiny">chunking, indexing, RAG</text>
  <path class="arrow" d="M812 194 V244"/>
  <path class="arrow" d="M812 352 V402"/>
  <path class="arrow" d="M942 456 H1036"/>
  <text x="978" y="432" class="tiny">LLM apps</text>
</svg>
