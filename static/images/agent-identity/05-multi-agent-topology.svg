<svg xmlns="http://www.w3.org/2000/svg" width="700" height="390" viewBox="0 0 700 390"
  style="font-family:'PingFang SC','Microsoft YaHei',system-ui,sans-serif;background:#fff;border-radius:10px;">
<defs>
  <marker id="a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6z" fill="#888"/>
  </marker>
  <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6z" fill="#5070c0"/>
  </marker>
  <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
    <path d="M0,0 L8,3 L0,6z" fill="#50a070"/>
  </marker>
</defs>
<rect x="0" y="0" width="700" height="390" fill="#fff" stroke="#eee" stroke-width="1" rx="10"/>
<text x="350" y="26" font-size="15" fill="#111" font-weight="600" text-anchor="middle" dominant-baseline="central">多智能体拓扑：身份是协调层属性</text>
<text x="350" y="46" font-size="11" fill="#999" font-weight="normal" text-anchor="middle" dominant-baseline="central">Identity lives in coordination protocol, not any single node</text>
<line x1="40" y1="60" x2="660" y2="60" stroke="#eee" stroke-width="1"/>
<ellipse cx="350" cy="84" rx="58" ry="20" fill="#eef3ff" stroke="#5070c0" stroke-width="1.5"/>
<text x="350" y="84" font-size="12" fill="#5070c0" font-weight="600" text-anchor="middle" dominant-baseline="central">用户入口</text>
<line x1="350" y1="104" x2="350" y2="130" stroke="#5070c0" stroke-width="1.5" marker-end="url(#ab)"/>
<text x="358" y="112" font-size="9" fill="#5070c0" font-weight="normal" text-anchor="start" dominant-baseline="central">单一身份</text>
<rect x="268" y="132" width="164" height="58" fill="#eef3ff" stroke="#5070c0" stroke-width="2" rx="8"/>
<text x="350" y="152" font-size="14" fill="#5070c0" font-weight="700" text-anchor="middle" dominant-baseline="central">Main Agent</text>
<text x="350" y="168" font-size="10" fill="#888" font-weight="normal" text-anchor="middle" dominant-baseline="central">携带完整 SOUL + 长期记忆</text>
<rect x="44" y="248" width="112" height="54" fill="#edfff4" stroke="#3a9060" stroke-width="1.5" rx="7"/>
<text x="100" y="264" font-size="12" fill="#3a9060" font-weight="600" text-anchor="middle" dominant-baseline="central">Sub Agent A</text>
<text x="100" y="290" font-size="9" fill="#888" font-weight="normal" text-anchor="middle" dominant-baseline="central">代码执行</text>
<path d="M350,190 C350,219 100,219 100,248" stroke="#3a9060" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<rect x="192" y="248" width="112" height="54" fill="#fff8ec" stroke="#c07030" stroke-width="1.5" rx="7"/>
<text x="248" y="264" font-size="12" fill="#c07030" font-weight="600" text-anchor="middle" dominant-baseline="central">Sub Agent B</text>
<text x="248" y="290" font-size="9" fill="#888" font-weight="normal" text-anchor="middle" dominant-baseline="central">网络检索</text>
<path d="M350,190 C350,219 248,219 248,248" stroke="#c07030" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<rect x="340" y="248" width="112" height="54" fill="#fdf0ff" stroke="#9050c0" stroke-width="1.5" rx="7"/>
<text x="396" y="264" font-size="12" fill="#9050c0" font-weight="600" text-anchor="middle" dominant-baseline="central">Task Agent</text>
<text x="396" y="290" font-size="9" fill="#888" font-weight="normal" text-anchor="middle" dominant-baseline="central">动态 spawn</text>
<path d="M350,190 C350,219 396,219 396,248" stroke="#9050c0" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<rect x="488" y="248" width="112" height="54" fill="#f5f5f5" stroke="#888" stroke-width="1.5" rx="7"/>
<text x="544" y="264" font-size="12" fill="#888" font-weight="600" text-anchor="middle" dominant-baseline="central">Channel</text>
<text x="544" y="279" font-size="12" fill="#888" font-weight="600" text-anchor="middle" dominant-baseline="central">Agent</text>
<text x="544" y="290" font-size="9" fill="#888" font-weight="normal" text-anchor="middle" dominant-baseline="central">WhatsApp/Slack</text>
<path d="M350,190 C350,219 544,219 544,248" stroke="#888" stroke-width="1.2" stroke-dasharray="5,3" fill="none" marker-end="url(#a)"/>
<rect x="50" y="322" width="600" height="44" fill="#f0f4ff" stroke="#8090c0" stroke-width="1.5" rx="7"/>
<text x="350" y="336" font-size="12" fill="#5070c0" font-weight="600" text-anchor="middle" dominant-baseline="central">Coordination Protocol（协调层）</text>
<text x="350" y="352" font-size="10" fill="#666" font-weight="normal" text-anchor="middle" dominant-baseline="central">身份连续性 = 协调协议的质量，而非任意单节点的 SOUL 完整性</text>
<text x="56" y="240" font-size="9" fill="#aaa" font-weight="normal" text-anchor="start" dominant-baseline="central">内部：涌现网络</text>
</svg>