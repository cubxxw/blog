<path d="M122,162 C122,176 350,172 350,186" stroke="#c8d8f0" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
<rect x="200" y="106" width="120" height="56" fill="#edfff4" stroke="#3a9060" stroke-width="1.5" rx="7"/>
<text x="260" y="126" font-size="12" fill="#3a9060" font-weight="600" text-anchor="middle" dominant-baseline="central">Memory</text>
<text x="260" y="143" font-size="10" fill="#666" font-weight="normal" text-anchor="middle" dominant-baseline="central">记忆层</text>
<path d="M260,162 C260,176 350,172 350,186" stroke="#c8d8f0" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
<rect x="338" y="106" width="120" height="56" fill="#fdf0ff" stroke="#9050c0" stroke-width="1.5" rx="7"/>
<text x="398" y="126" font-size="12" fill="#9050c0" font-weight="600" text-anchor="middle" dominant-baseline="central">Evaluation</text>
<text x="398" y="143" font-size="10" fill="#666" font-weight="normal" text-anchor="middle" dominant-baseline="central">评估标准</text>
<path d="M398,162 C398,176 350,172 350,186" stroke="#c8d8f0" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
<rect x="476" y="106" width="120" height="56" fill="#fff0f0" stroke="#c04040" stroke-width="1.5" rx="7"/>
<text x="536" y="126" font-size="12" fill="#c04040" font-weight="600" text-anchor="middle" dominant-baseline="central">Reward</text>
<text x="536" y="143" font-size="10" fill="#666" font-weight="normal" text-anchor="middle" dominant-baseline="central">奖励信号</text>
<path d="M536,162 C536,176 350,172 350,186" stroke="#c8d8f0" stroke-width="1" stroke-dasharray="4,2" fill="none"/>
<rect x="50" y="286" width="600" height="32" fill="#f0f0f0" stroke="#ddd" stroke-width="1.5" rx="7"/>
<text x="350" y="302" font-size="11" fill="#555" font-weight="normal" text-anchor="middle" dominant-baseline="central">LLM（引擎）  +  Harness（规则 + 环境）  =  Agent（具有可持续身份）</text>
