<path d="M649,130 C673,204 27,204 51,130" stroke="#3a9060" stroke-width="1.5" stroke-dasharray="5,3" fill="none" marker-end="url(#ag)"/>
<text x="350" y="211" font-size="11" fill="#3a9060" font-weight="normal" text-anchor="middle" dominant-baseline="central">经济飞轮：积分 → 算力 → 能力 → 更多贡献</text>
<rect x="50" y="220" width="600" height="38" fill="#f5f5ff" stroke="#c0c0e8" stroke-width="1.5" rx="7"/>
