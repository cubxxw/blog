    - name: email
      title: Email
      url: https://mail.google.com/mail/u/0/?fs=1&tf=cm&to=3293172751nss@gmail.com
    - name: xhs
      title: 小红书
      url: https://www.xiaohongshu.com/user/profile/62a33af9000000001b025dd3
    - name: wechat
      title: 微信 / WeChat
      wechatID: nsddd_top
      qr: /wechat.jpg
  social:
    twitter: cubxxw
  ShareButtons: ["linkedin", "twitter","bilibili","zhihu","email","facebook", "reddit", "telegram", "whatsapp", "ycombinator", "weibo", "xiaohongshu"] # To customize which share buttons to be enabled on page
  analytics:
    google:
      SiteVerificationTag: "" # 在 Google Search Console 获取 HTML 标签验证码后填入此处
    bing:
      SiteVerificationTag: ""
    yandex:
      SiteVerificationTag: ""
  cover:
    hidden: false
    hiddenInList: true
    hiddenInSingle: false
  fuseOpts:
    # https://www.fusejs.io/api/options.html#ignorefieldnorm
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content
  mainSections:
    - ai-technology
    - growth
    - projects
  ShowAllPagesInArchive: false
  sidebar:
    widgets:
      - type: "custom"
        title: "AI 项目导航"
        template: "sidebar-ai-projects"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true

# Hugo internal services configuration
services:
  rss:
    # -1 = include all pages, no cap. Default would silently truncate large sites.
    limit: -1

# Custom media types & output formats: JSON Feed 1.1 + OPML subscription list.
mediaTypes:
  application/feed+json:
    suffixes: ["json"]
  text/x-opml:
    suffixes: ["opml"]

outputFormats:
  JSONFeed:
    name: JSONFeed
    mediaType: application/feed+json
    baseName: feed
    isPlainText: true
    rel: alternate
    notAlternative: false
  OPML:
    name: OPML
    mediaType: text/x-opml
    baseName: subscriptions
    isPlainText: true
    rel: alternate
    notAlternative: false
  # News sitemap for posts published within last 2 days (Google News spec)
  NewsSitemap:
    name: NewsSitemap
    mediaType: application/xml
    baseName: news-sitemap
    isPlainText: false
    rel: sitemap
    notAlternative: true

outputs:
    home:
      - HTML
      - RSS
      - JSON           # search index
      - JSONFeed       # JSON Feed 1.1 at /feed.json
      - OPML           # /subscriptions.opml
      - NewsSitemap    # /news-sitemap.xml
    section:
      - HTML
      - RSS
      - JSONFeed
    taxonomy:
      - HTML
      - RSS
    term:
      - HTML
      - RSS

# Taxonomies — keep Hugo defaults (tag/category) and add `column` for
# multi-part essay groups ("专栏"). Each article opts in via frontmatter:
#   columns: [ignite-and-settle]
# URL becomes /columns/ignite-and-settle/ (and /zh/columns/...).
taxonomies:
  category: categories
  tag: tags
  column: columns

permalinks:
  columns: /columns/:slug/

# languageCode: en-us
DefaultContentLanguage: en
# 启用多语言模式
defaultContentLanguageInSubdir: false
# 禁用语言前缀移除（确保 URL 结构正确）
disableLanguages: []

