    favicon32x32: ./favicon-32x32.png
    apple_touch_icon: ./apple-touch-icon.png
    # safari_pinned_tab: <link / abs url>
    customCSS: ["css/custom.css", "css/nav-elegant.css"]
  label:
    text: Home
    icon: ./assets/cubxxw-image.jpg
    iconHeight: 35
