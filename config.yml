baseURL: https://nsddd.top
title: 熊鑫伟 (cubxxw) 的博客 - AI Builder · Open Source Contributor · Digital Nomad
theme: PaperMod

# Config WIKI
# https://github.com/adityatelange/hugo-PaperMod/wiki/Variables
enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: true
googleAnalytics: G-FSWQC2Y01E
pygmentsUseClasses: true
minify:
  disableXML: true
  minifyOutput: true
params:
  env: production
  title: 熊鑫伟 (cubxxw) 的博客
  description: AI Builder、开源贡献者、数字游民的技术与成长博客。分享 Kubernetes、Go 语言、AI 开源项目、个人成长思考、旅行见闻。
  keywords:
    - cubxxw
    - 熊鑫伟
    - AI 创业
    - 开源项目
    - Kubernetes
    - Go 语言
    - 云原生
    - 个人成长
    - 数字游民
    - 技术博客
  author: 熊鑫伟 (Xinwei Xiong)
  images:
    - /assets/og-image.png
    - /assets/cubxxw-image.jpg
  DateFormat: January 2, 2006
  # defaultTheme: light
  # defaultTheme: dark
  defaultTheme: auto # to switch between dark or light according to browser theme
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowFullTextinRSS: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false

  showtoc: true
  tocopen: true
  assets:
    favicon: ./favicon.ico
    favicon16x16: ./favicon-16x16.png
    favicon32x32: ./favicon-32x32.png
    apple_touch_icon: ./apple-touch-icon.png
    # safari_pinned_tab: <link / abs url>
    customCSS: ["css/custom.css", "css/nav-elegant.css"]
  label:
    text: Home
    icon: ./assets/cubxxw-image.jpg
    iconHeight: 35
  homeInfoParams:
    Title: Hi there 👋
    Content: My name is Xinwei(bear) Xiong. My loyalty is to adventure 🤖
  socialIcons:
    - name: github
      url: https://github.com/cubxxw
    - name: zhihu
      url: https://www.zhihu.com/people/3293172751
    - name: bilibili
      url: https://space.bilibili.com/1233089591
    - name: youtube
      url: https://www.youtube.com/channel/UCd3qbRbMwYlh5uKneo_2m_w
    - name: buymeacoffee
      url: https://www.buymeacoffee.com/cubxxw
    - name: email
      url: https://mail.google.com/mail/u/0/?fs=1&tf=cm&to=3293172751nss@gmail.com
    - name: xhs
      url: https://www.xiaohongshu.com/user/profile/62a33af9000000001b025dd3
  ShareButtons: ["linkedin", "twitter","bilibili","zhihu","email","facebook", "reddit", "telegram", "whatsapp", "ycombinator", "webo", "xiaohongshu"] # To customize which share buttons to be enabled on page
  analytics:
    google:
      SiteVerificationTag: ""
    bing:
      SiteVerificationTag: ""
    yandex:
      SiteVerificationTag: ""
  cover:
    hidden: true
    hiddenInList: true
    hiddenInSingle: true
  fuseOpts:
    # https://www.fusejs.io/api/options.html#ignorefieldnorm
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys:
      - title
      - permalink
      - summary
      - content
  mainSections:
    - ai-technology
    - growth
    - projects
  ShowAllPagesInArchive: false
  sidebar:
    widgets:
      - type: "custom"
        title: "AI 项目导航"
        template: "sidebar-ai-projects"

markup:
  highlight:
    noClasses: false
  goldmark:
    renderer:
      unsafe: true
outputs:
    home:
      - HTML
      - RSS
      - JSON # is necessary

# languageCode: en-us
